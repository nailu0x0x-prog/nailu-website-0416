<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000510">
<title>観測所 — メンテナンス中</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000510;font-family:'Kaisei Decol',serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;text-align:center;padding:40px 24px;}
.icon{font-size:52px;margin-bottom:20px;animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.title{font-size:22px;font-weight:700;letter-spacing:0.25em;margin-bottom:8px;text-shadow:0 0 20px rgba(0,0,255,0.9);}
.sub{font-size:10px;color:#378add;letter-spacing:0.4em;margin-bottom:32px;}
.msg{font-size:13px;color:rgba(255,255,255,0.65);line-height:2.2;letter-spacing:0.08em;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#378add;margin:0 3px;animation:blink 1.4s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}
.border-wrap{border:1px solid rgba(55,138,221,0.3);border-radius:20px;padding:36px 32px;background:rgba(10,20,50,0.6);backdrop-filter:blur(12px);max-width:360px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,255,0.15);}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="border-wrap">
    <div class="icon">🌌</div>
    <div class="title">観測所</div>
    <div class="sub">OBSERVATION STATION</div>
    <div class="msg">
      ただいまメンテナンス中だよ<br>
      もうすこし待っててね<span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>
</div>
<script>
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let stars=[];
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;stars=[];for(let i=0;i<160;i++)stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.3+0.3,o:Math.random(),s:Math.random()*0.007+0.002});}
function draw(){cx.clearRect(0,0,cv.width,cv.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<.1)s.s*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(180,210,255,${Math.abs(s.o)})`;cx.fill();});requestAnimationFrame(draw);}
rsz();draw();window.addEventListener('resize',rsz);
</script>
</body>
</html>
